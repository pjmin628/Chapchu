<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>임용시험 플래시카드</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root, [data-theme="dark"]{
  --bg:#0d1117; --panel:#161b22; --panel2:#1c2230; --border:#30363d;
  --text:#e6edf3; --muted:#8b949e; --accent:#f0b429; --accent2:#388bfd;
  --high:#f0b429; --vhigh:#fb7185; --ok:#3fb950;
  --header-bg:rgba(13,17,23,.85);
  --card-grad:linear-gradient(160deg,#161b22,#1c2230);
  --card-shadow:0 12px 40px rgba(0,0,0,.4);
  --tab-active-text:#1a1100;
  --th-bg:rgba(56,139,253,.14); --td-bg:rgba(255,255,255,.015);
  --glow1:rgba(56,139,253,.08); --glow2:rgba(240,180,41,.06);
}
[data-theme="light"]{
  --bg:#f6f8fa; --panel:#ffffff; --panel2:#f0f3f7; --border:#d6dce3;
  --text:#1f2328; --muted:#6b7480; --accent:#bf8700; --accent2:#0969da;
  --high:#bf8700; --vhigh:#cf3a52; --ok:#1a7f37;
  --header-bg:rgba(255,255,255,.88);
  --card-grad:linear-gradient(160deg,#ffffff,#eef2f7);
  --card-shadow:0 10px 30px rgba(140,150,170,.25);
  --tab-active-text:#ffffff;
  --th-bg:rgba(9,105,218,.1); --td-bg:rgba(0,0,0,.012);
  --glow1:rgba(9,105,218,.06); --glow2:rgba(191,135,0,.05);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:'Noto Sans KR',-apple-system,BlinkMacSystemFont,sans-serif;
  background:var(--bg); color:var(--text);
  display:flex; flex-direction:column; min-height:100vh;
  background-image:radial-gradient(circle at 20% 0%,var(--glow1),transparent 40%),radial-gradient(circle at 80% 100%,var(--glow2),transparent 40%);
  transition:background-color .25s,color .25s;
}
.topbar{
  position:sticky; top:0; z-index:20;
  background:var(--header-bg); backdrop-filter:blur(8px);
}
header{
  padding:16px 16px 10px; text-align:center;
  border-bottom:1px solid var(--border); position:relative;
}
header h1{font-size:18px; font-weight:900; letter-spacing:-.3px}
header h1 .logo{margin-right:6px}
header .sub{font-size:11px; color:var(--muted); margin-top:3px}
.theme-btn{
  position:absolute; top:14px; right:14px; width:38px; height:38px;
  border-radius:50%; border:1px solid var(--border); background:var(--panel2);
  color:var(--text); font-size:18px; cursor:pointer; display:flex;
  align-items:center; justify-content:center; transition:.18s; font-family:inherit;
}
.theme-btn:active{transform:scale(.9)}
.tabs{
  display:flex; gap:6px; overflow-x:auto; padding:10px 12px;
  scrollbar-width:none; border-bottom:1px solid var(--border);
  background:var(--panel);
}
.tabs::-webkit-scrollbar{display:none}
.tab{
  flex:0 0 auto; padding:8px 14px; border-radius:999px;
  border:1px solid var(--border); background:var(--panel2); color:var(--muted);
  font-size:13px; font-weight:700; cursor:pointer; white-space:nowrap;
  transition:.18s; font-family:inherit;
}
.tab .cnt{font-size:11px; opacity:.7; margin-left:4px; font-weight:500}
.tab.active{background:var(--accent); color:var(--tab-active-text); border-color:var(--accent)}
.wrap{
  flex:1; display:flex; flex-direction:column; align-items:center;
  justify-content:flex-start; padding:18px 14px 28px; gap:14px;
}
.meta{
  width:100%; max-width:560px; display:flex; align-items:center;
  justify-content:space-between; font-size:12px; color:var(--muted);
}
.meta .imp{display:flex; align-items:center; gap:6px}
.toolbar{
  width:100%; max-width:560px; display:flex; align-items:center; gap:8px;
  margin-top:-4px;
}
.tool-btn{
  padding:7px 12px; border-radius:999px; border:1px solid var(--border);
  background:var(--panel2); color:var(--muted); font-size:12px; font-weight:700;
  cursor:pointer; font-family:inherit; transition:.15s; white-space:nowrap;
}
.tool-btn:active{transform:scale(.94)}
.tool-btn.active{background:var(--accent2); color:#fff; border-color:var(--accent2)}
.order-tag{font-size:11px; color:var(--accent2); font-weight:700; margin-left:auto}
.badge{padding:3px 9px; border-radius:999px; font-size:11px; font-weight:700; border:1px solid}
.badge.high{color:var(--high); border-color:var(--high); background:rgba(240,180,41,.08)}
.badge.vhigh{color:var(--vhigh); border-color:var(--vhigh); background:rgba(251,113,133,.1)}
.scene{width:100%; max-width:560px; perspective:1600px; -webkit-perspective:1600px; flex:1; min-height:60vh; display:flex}
.card{
  position:relative; width:100%;
  transform-style:preserve-3d; -webkit-transform-style:preserve-3d;
  transition:transform .5s cubic-bezier(.4,.2,.2,1); cursor:pointer;
}
.card.flipped{transform:rotateY(180deg)}
.face{
  position:absolute; inset:0; backface-visibility:hidden; -webkit-backface-visibility:hidden;
  border:1px solid var(--border); border-radius:18px; padding:22px 20px;
  background:var(--card-grad);
  overflow-y:auto; display:flex; flex-direction:column;
  box-shadow:var(--card-shadow);
  /* backface-visibility 미지원 브라우저 대비: 뒤집기 애니메이션 중간(0.25s)에 visibility 전환 */
  transition:visibility 0s linear .25s;
}
.face::-webkit-scrollbar{width:5px}
.face::-webkit-scrollbar-thumb{background:var(--border); border-radius:3px}
.front{
  align-items:center; justify-content:center; text-align:center;
  transform:rotateY(0deg) translateZ(1px); -webkit-transform:rotateY(0deg) translateZ(1px);
  visibility:visible;
}
.card.flipped .front{visibility:hidden}
.front .q-label{
  font-size:11px; font-weight:700; color:var(--accent2); letter-spacing:1px;
  text-transform:uppercase; margin-bottom:14px;
}
.front .q-text{font-size:22px; font-weight:700; line-height:1.5; letter-spacing:-.4px}
.front .hint{position:absolute; bottom:16px; font-size:11px; color:var(--muted)}
.back{
  transform:rotateY(180deg) translateZ(1px); -webkit-transform:rotateY(180deg) translateZ(1px);
  visibility:hidden;
}
.card.flipped .back{visibility:visible}
.back .a-label{
  font-size:11px; font-weight:700; color:var(--ok); letter-spacing:1px;
  text-transform:uppercase; margin-bottom:12px; flex:0 0 auto;
}
.back .a-body{font-size:15px; line-height:1.7; word-break:keep-all}
.back .a-body h3{font-size:16px; color:var(--accent); margin:12px 0 6px; font-weight:700}
.back .a-body h3:first-child{margin-top:0}
.back .a-body .li{display:flex; gap:7px; margin:5px 0; align-items:flex-start}
.back .a-body .li .mk{flex:0 0 auto; color:var(--accent2); font-weight:700}
.back .a-body .li .tx{flex:1}
.back .a-body p{margin:7px 0}
.back .a-body .star{color:var(--high); font-weight:700}
.back .a-body .star.vh{color:var(--vhigh)}
.back .a-body table{
  width:100%; border-collapse:collapse; margin:12px 0; font-size:13px;
  border:1px solid var(--border); border-radius:8px; overflow:hidden;
}
.back .a-body th,.back .a-body td{
  border:1px solid var(--border); padding:7px 9px; text-align:left; vertical-align:top; line-height:1.5;
}
.back .a-body th{background:var(--th-bg); color:var(--text); font-weight:700}
.back .a-body td{background:var(--td-bg)}
.controls{
  width:100%; max-width:560px; display:flex; gap:10px; align-items:center;
}
.btn{
  flex:1; padding:14px 10px; border-radius:14px; border:1px solid var(--border);
  background:var(--panel2); color:var(--text); font-size:14px; font-weight:700;
  cursor:pointer; font-family:inherit; transition:.15s;
}
.btn:active{transform:scale(.96)}
.btn.flip{flex:1.5; background:var(--accent2); border-color:var(--accent2); color:#fff}
.btn:disabled{opacity:.35; cursor:default}
.dots{
  width:100%; max-width:560px; display:flex; flex-wrap:wrap; gap:5px;
  justify-content:center; padding-top:2px;
}
.dot{width:7px; height:7px; border-radius:50%; background:var(--border); transition:.15s}
.dot.done{background:var(--ok)}
.dot.cur{background:var(--accent); transform:scale(1.5)}
.counter{font-weight:700; color:var(--text)}
@media(max-width:420px){
  .front .q-text{font-size:19px}
  .back .a-body{font-size:14px}
  .face{padding:18px 15px}
}

/* ---- 검색 UI ---- */
.searchbar{
  display:flex; align-items:center; gap:8px; padding:10px 12px;
  background:var(--panel); border-bottom:1px solid var(--border);
}
.searchbar .search-icon{font-size:14px; opacity:.7; flex:0 0 auto}
.searchbar input{
  flex:1; min-width:0; padding:9px 12px; border-radius:999px;
  border:1px solid var(--border); background:var(--panel2); color:var(--text);
  font-size:13px; font-family:inherit; outline:none; transition:.15s;
}
.searchbar input:focus{border-color:var(--accent2)}
.searchbar input::placeholder{color:var(--muted)}
.search-clear{
  flex:0 0 auto; width:30px; height:30px; border-radius:50%;
  border:1px solid var(--border); background:var(--panel2); color:var(--muted);
  font-size:12px; cursor:pointer; font-family:inherit; display:none;
  align-items:center; justify-content:center; transition:.15s;
}
.search-clear:active{transform:scale(.9)}
.search-clear.show{display:flex}
.search-results{
  width:100%; max-width:560px; display:flex; flex-direction:column; gap:10px;
}
.search-summary{font-size:12px; color:var(--muted); padding:2px 2px 4px}
.search-summary b{color:var(--accent2)}
.result-card{
  border:1px solid var(--border); border-radius:14px; padding:14px 16px;
  background:var(--card-grad); cursor:pointer; transition:.15s;
  box-shadow:0 4px 14px rgba(0,0,0,.12);
}
.result-card:active{transform:scale(.985)}
.result-card .rc-top{display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-bottom:6px}
.result-card .rc-subject{
  font-size:11px; font-weight:700; color:var(--accent2);
  background:rgba(56,139,253,.12); border:1px solid var(--accent2);
  padding:2px 8px; border-radius:999px;
}
.result-card .rc-front{font-size:15px; font-weight:700; line-height:1.45; letter-spacing:-.3px}
.result-card .rc-snippet{font-size:12.5px; color:var(--muted); line-height:1.55; margin-top:6px; word-break:keep-all}
.result-card mark{background:rgba(240,180,41,.35); color:var(--text); border-radius:3px; padding:0 2px}
.search-empty{text-align:center; color:var(--muted); font-size:13px; padding:40px 10px; line-height:1.7}

</style>
</head>
<body>
<div class="topbar">
<header>
  <button class="theme-btn" id="themeBtn" aria-label="테마 전환">🌙</button>
  <h1><span class="logo">📚</span>임용시험 플래시카드</h1>
  <div class="sub">앞면=주제·질문 · 뒷면=내용·정답 · 카드를 눌러 뒤집기</div>
</header>
<nav class="tabs" id="tabs"></nav>
<div class="searchbar">
  <span class="search-icon">🔍</span>
  <input type="text" id="searchInput" placeholder="모든 과목에서 카드 검색 (주제·내용)" autocomplete="off">
  <button class="search-clear" id="searchClear" aria-label="검색어 지우기">✕</button>
</div>
</div>
<div class="wrap">
  <div id="searchResults" class="search-results" style="display:none"></div>
  <div class="meta">
    <span class="counter" id="counter">1 / 1</span>
    <span class="imp" id="imp"></span>
  </div>
  <div class="toolbar">
    <button class="tool-btn" id="shuffleBtn">🔀 순서 섞기</button>
    <button class="tool-btn" id="resetBtn">↺ 원래 순서</button>
    <span class="order-tag" id="orderTag"></span>
  </div>
  <div class="scene">
    <div class="card" id="card">
      <div class="face front">
        <div class="q-label">주제 · 질문</div>
        <div class="q-text" id="frontText"></div>
        <div class="hint">눌러서 정답 확인 ↻</div>
      </div>
      <div class="face back">
        <div class="a-label">내용 · 정답</div>
        <div class="a-body" id="backText"></div>
      </div>
    </div>
  </div>
  <div class="controls">
    <button class="btn" id="prevBtn">← 이전</button>
    <button class="btn flip" id="flipBtn">정답 확인 ↻</button>
    <button class="btn" id="nextBtn">다음 →</button>
  </div>
  <div class="dots" id="dots"></div>
</div>

정을 통합)"}, {"front": "[발달과정] 학문중심 교육과정(1960년~1970년) — 기본 개념", "importance": "high", "back": "- 학문의 핵심적 지식과 원리를 체계적으로 조직 → 지식의 구조를 이해/탐구하는 능력을 기르는 교육과정"}, {"front": "[발달과정] 학문중심 교육과정 — 특징 4 (목표·내용·조직원리·방법)", "importance": "high", "back": "1) (교육목표) 교과 내 핵심 지식 & 원리 습득, 탐구능력 향상\n2) (교육내용) 지식의 구조\n3) (교육내용 조직원리) 나선형 교육과정\n4) (교육방법) 발견학습"}, {"front": "[발달과정] 학문중심 교육과정 — 지식의 구조란", "importance": "high", "back": "- 각 학문의 가장 중요한 개념과 원리, 아이디어를 구조적으로 조직한 것"}, {"front": "[발달과정] 학문중심 교육과정 — 나선형 교육과정이란", "importance": "high", "back": "- 학습자 발달단계에 따라 기본개념/원리를 반복하며 폭과 깊이를 점진적으로 확대하도록 조직한 교육과정"}, {"front": "[발달과정] 학문중심 교육과정 — 장점 3", "importance": "high", "back": "1) 높은 학습 전이가 가능 (기본 원리와 핵심 아이디어를 학습한 것은 전이가 잘 됨)\n2) 내재적 동기 유발\n3) 고등정신능력 향상 (탐구 & 발견 과정에서 적용력/분석력 등 향상)"}, {"front": "[발달과정] 학문중심 교육과정 — 단점 3", "importance": "high", "back": "1) 정의적 교육엔 소홀\n2) 실생활과 유리된 비실용성 (지식의 구조는 순수 지식만 강조)\n3) 상위권 학습자에게 유리한 교육 (하위권 학습자는 지식의 구조 발견이 어려움)"}, {"front": "[발달과정] 인간중심 교육과정(1970년대 이후) — 기본 개념", "importance": "normal", "back": "- 자아실현과 전인교육을 위해, 학교에서 의도하거나 의도하지 않은 모든 경험으로 이루어진 교육과정"}, {"front": "[발달과정] 인간중심 교육과정 — 특징 5 (목표·내용·방법·평가·통합)", "importance": "normal", "back": "1) (교육목표) 전인교육 (자아실현에 도움되는 교육)\n2) (교육내용) 학생이 학교생활을 하는 동안 갖게 되는 모든 경험\n3) (교육방법) 학생의 주체성을 존중 (학생 잠재력을 최대한 발휘할 수 있게 도움)\n4) (교육평가) 자율적 자기평가 지향\n5) 잠재적 교육과정과 통합 교육과정(교과+경험+학문 중심 교육과정) 중시"}, {"front": "[발달과정] 인간중심 교육과정 — 장점 3", "importance": "normal", "back": "1) 인간의 성장 가능성을 조화롭게 발달시킬 수 있음\n2) 학습자의 긍정적 자아개념 형성\n3) 교육/교육환경의 인간화에 기여 (학생을 능동적/적극적 학습자로 봄)"}, {"front": "[발달과정] 인간중심 교육과정 — 단점 2", "importance": "normal", "back": "1) 현실 적용의 어려움 (현실적 교육 환경에 적용 어려움)\n2) 개인주의 우려 (개인 성장만 중시함, 사회적 관계 경시함)"}, {"front": "[발달과정] 통합 교육과정 — 기본 개념", "importance": "very_high", "back": "- 학생의 관심/흥미/주제 등을 중심으로 교육내용을 통합하여 조직하는 교육과정"}, {"front": "[발달과정] 통합 교육과정 — 특징 4", "importance": "very_high", "back": "1) 학생의 흥미를 고려하여 교사와 함께 학습 주제를 계획함\n2) 학생·활동 중심 수업을 함 (교과중심 수업보다는 프로젝트 학습 등)\n3) 지식의 기본 원리를 강조 & 지식의 분절화를 방지함\n4) 교사는 안내자/조력자/학생 상담자의 역할을 수행함 (교사는 지식 전달자가 수용학습이론 — 기본개념 & 유의미 학습이란", "importance": "very_high", "back": "### 기본개념\n- 설명식 수업에서 유의미한 학습을 유발하는 수업 설계를 위한 이론\n### 유의미 학습이란\n- 새로운 지식과 기존 지식의 연결이 이뤄지는 학습"}, {"front": "[교수이론] 오수벨 — 유의미 학습 조건 3", "importance": "very_high", "back": "1) 논리적 유의미성 (학습과제가 ①실사성 / ②구속성을 가져야 함)\n2) 잠재적 유의미성 (학습자가 관련정착의미를 가져야 함)\n3) 심리적 유의미성 (학습자가 유의미 학습 태세를 가져야 함)"}, {"front": "[교수이론] 오수벨 — 선행조직자란 & 기능 & 종류 2", "importance": "very_high", "back": "### 선행조직자란\n- 새로운 과제 학습 전, 유의미학습 촉진을 위해 교사가 수업 도입부에 제시하는 도입 자료\n### 기능\n- 새로운 학습 과제를 기존 인지구조로 더 쉽게 포섭하게 도움\n### 종류 2\n1) 설명 조직자 (친숙하지 않은 과제에 → 이해 위해 개념적 근거 제시)\n2) 비교 조직자 (친숙한 과제에 → 유사점, 차이점 제시)"}, {"front": "[교수이론] 오수벨 — 포섭이란 & 포섭 종류 3", "importance": "very_high", "back": "### 포섭이란\n- 학습자의 인지구조에 새로운 내용이 정착(흡수)되는 것\n### 포섭 종류 3\n1) 하위적 포섭 (새로운 내용이 기존의 하위 개념) (①상관적 포섭, ②파생적 포섭)\n2) 상위적 포섭 (새로운 내용이 기존의 상위 개념)\n3) 병렬적 포섭 (대등한 개념끼리 포섭)"}, {"front": "[교수이론] 오수벨 — 유의미 수용학습의 원리 6", "importance": "very_high", "back": "1) 선행조직자의 원리\n2) 점진적 분화의 원리 (포괄 → 구체 순서로 제시)\n3) 통합적 조정의 원리 (새로운 내용이 기존 내용에 포섭되게)\n4) 선행학습의 요약 정리의 원리\n5) 내용의 체계적 조직의 원리\n6) 학습자 준비도의 원리 (학습자 기존 인지구조 고려하라)"}, {"front": "[교수이론] 오수벨 — 장점 2 & 단점 2", "importance": "very_high", "back": "### 장점 2\n1) (강의식 수업 → 지식 효율적 전달) 학습자의 학습 시간 절약\n2) 안정된 파지와 높은 학습전이\n### 단점 2\n1) (학생이 비판적 능력 없을 경우) 학습자의 수동적 태도 양산\n2) 교수자의 능력/준비에 따라 수업의 질이 크게 달라짐"}, {"front": "[교수이론] 구성주의 교수이론 — 기본개념", "importance": "normal", "back": "1) 학습자가 경험을 통해 스스로 지식을 구성한다 (지식이 객관적으로 존재 X)"}, {"front": "[교수이론] 객관주의 vs 구성주의 비교", "importance": "normal", "table": "<table><tr><th>구분</th><th>객관주의</th><th>구성주의</th></tr>\n<tr><td>교수 설계</td><td>내용 효과적 전달되게 수업 설계</td><td>자발적 학습 일어날 환경 설계</td></tr>\n<tr><td>학습 결과</td><td>모든 사람이 같은 이해에 도달</td><td>개인마다 구성한 지식 다름</td></tr>\n<tr><td>수업 중심</td><td>교사</td><td>학습자</td></tr>\n<tr><td>수업 방법</td><td>강의/암기/반복/대집단 학습</td><td>협동학습/소집단활동/문제해결학습</td></tr>\n<tr><td>교사 역할</td><td>지식의 전달자</td><td>지식 구성 위한 안내자</td></tr></table>", "back": "객관주의와 구성주의는 교수 설계·학습 결과·수업 중심·수업 방법·교사 역할에서 대비된다."}, {"front": "[교수이론] 구성주의 — t": "[전통적 교수법] 개별화학습 — ④ 프로그램 학습(스키너) & 교수기계 원리 4", "importance": "high", "back": "### 기본개념\n- 학습 부진아의 완전 학습을 위한 개별화 수업\n### 개별화 교수기계(프로그램) 원리 4\n1) 단계적 학습의 원리\n2) 자기 속도의 원리\n3) 능동적(적극적) 반응의 원리 (너무 어렵지 않은 것 제시하여 참여 유도)\n4) 즉각적 강화의 원리 (문제 풀고 바로 결과 알려주면 쉽게 교정)"}, {"front": "[전통적 교수법] 개별화학습 — ⑤ 개별 처방식 수업 & ⑥ 적성처치 상호작용모형", "importance": "high", "back": "### ⑤ 개별 처방식 수업\n- 학습 전 진단 검사를 통해 개별 출발점을 달리하는 교수법\n### ⑥ 적성처치 상호작용모형\n- (적성 따라 효과적 교수방법이 존재한다 주장하나) 적성에 따른 적합한 처치란 존재 X, 다양한 교수 변인을 사용해 개인차를 줄이는 것이 더 중요함을 시사"}, {"front": "[전통적 교수법] 개별화학습 — ⑦ 켈러의 개별화 교수체제(켈러플랜) & 원리 5", "importance": "high", "back": "### 기본내용\n- 스키너의 프로그램 학습법을 다인수 학급에 적용한 교수법\n### 원리 5\n1) 스스로 공부 가능하도록 ①프로그램 학습 자료 + ②학습 안내서 배부\n2) 단계적 학습의 원리\n3) 자기 속도의 원리\n4) 학습 보조원의 활용 (다 끝낸 학생을 튜터로 활용)\n5) 교수자의 직접 강의 (개별학습 보조를 위해 가끔)"}, {"front": "[전통적 교수법] 협동학습 — 기본개념 & 효과 극대화 요인 5 (존슨 앤 존슨)", "importance": "very_high", "back": "### 기본개념\n- 이질적 소집단 구성 → 소집단 내 상호작용을 통한 학습\n### 효과 극대화 요인 5\n1) 긍정적 상호 의존성\n2) 대면적 상호작용 (서로 직접 격려)\n3) 개별 책무성\n4) 사회적 기술 (사회적 기술 사전에 교육하기)\n5) 집단 과정 (각자 노력/협력 정도(과정)을 토론 & 평가해보는 시간)"}, {"front": "[전통적 교수법] 협동학습 — 효과 3", "importance": "very_high", "back": "1) 대부분 학생 모두 학업 성취도 향상 (못하면 도움 받고, 잘하면 도움 주며)\n2) 사회적 기술 향상\n3) 학습 동기 증진"}, {"front": "[전통적 교수법] 협동학습 — 발생 가능 문제점-해결방안 4", "importance": "very_high", "back": "1) 부익부 현상 – STAD 도입 (개인 향상 점수 반영한 팀 점수 산출)\n2) 무임승객 효과 – STAD 도입\n3) 봉 효과 – STAD 도입\n4) 집단 간 편파 심화 – 소집단 재편성"}, {"front": "[협동학습 종류] ① 직소Ⅰ — 절차 4", "importance": "very_high", "back": "1) 모집단 활동\n2) 전문가 활동\n3) 모집단 복귀, 학습내용 공유\n4) 개별 점수 산출, 개별 보상 (→ 서로 경쟁자로 여겨 설명 잘 안 해주는 현상 발생)"}, {"front": "[협동학습 종류] ② 직소Ⅱ — 직소Ⅰ과의 차별점 2", "importance": "very_high", "back": "(직소Ⅰ과 1~4단계 동일, 그 뒤에 아래 두 단계 추가)\n1) 팀 점수 산출 (STAD 보상방식)\n2) 집단 보상 제공 (→ 서로 팀으로 여겨 상호의존성 높아짐)"}, {"front": "[협동학습 종류] ③ 직소Ⅲ & ④ 직소Ⅳ — 차별점", "importance": "very_high", "back": "### 직소Ⅲ (직소Ⅱ와 동일, 퀴즈 전 추가)\n1) 퀴즈 대비 공부시간 제공\n### 직소Ⅳ (직소Ⅲ와 동일, 추가)\n1) 전체 수업 내용 소개\n2) 전문가 활동에 대한 퀴즈\n3) 재교수 활동"}, {"front": "[협동학습 종류] 직소 수업에서 교사의 역할 2", "importance": "very_high", "back": "1) 학습자에게 효율적 교수방법 안내 (서로 잘 가르쳐주도록)\n2) 예시자료, 보조자료 제공 (기초학력 부진학생들도 전문가 활동에 부담 없게)"}, {"front": "[협동학습 종류] ⑤ 성취과제분담모형(STAD) — 점수 산출 및 보상 방법 4", "importance": "very_high", "back": "1) 개별평가를 통한 개인 향상점수 산출\n2) 개인 향상 점수를 합산해 팀 점수 산출\n3) 개인 향상 점수와 팀 점수 게시\n4) 개인보상 + 집단 보상"}, {"front": "[협동학습 종류] STAD — 협동 전략 3", "importance": "very_high", "back": "1) 집단 보상 → 긍정적 상호의존성 부여\n2) 팀 점수 → 개별 책무성 부여\n3) 향상 점수 → 성공기회 균등 부여"}, {"front": "[협동학습 종류] ⑥ 팀경쟁학습(TGT) & ⑦ 팀보조개별학습(TAI) & ⑧ 함께 학습하기(LT)", "importance": "very_high", "back": "### ⑥ 팀경쟁학습(TGT)\n- 팀 간 수준이 비슷한 학생끼리의 토너먼트 경쟁\n### ⑦ 팀보조개별학습(TAI)\n- 개별 학습 + 협동학습 (모르는 내용 있을 때만 집단 내 동료 도움) 결합 모형\n### ⑧ 함께 학습하기(LT)\n- 과제 공동 수행 → 집단 보상 / 문제점: 무임승차 효과, 봉효과 발생"}, {"front": "[협동학습 종류] ⑨ 집단조사(GI) & ⑩ 자율적 협동학습(Co-op Co-op)", "importance": "very_high", "back": "### ⑨ 집단조사(GI)\n1) (전체 과제 → 하위 주제로 나눔) 소집단 별 하위 주제 조사학습 & 평가\n2) (과제 선정~발표까지 스스로 진행) 민주적 협동학습 모형\n### ⑩ 자율적 협동학습(Co-op Co-op)\n1) (과제 선정~발표까지 스스로 진행) 민주적 협동학습 모형\n2) 학급 전체가 협동해서 하나의 문제 해결"}, {"front": "[협동학습 종류] 자율적 협동학습 — 집단조사(GI)와의 차이점/특징 4 & 장점 3", "importance": "very_high", "back": "### 차이점/특징 4\n1) 대주제 선정도 학생들이 직접\n2) 대주제 → 하위주제 → 소주제로 세분화\n3) 2번의 협동 (소집단 내 협동 + 소집단 간 협동)\n4) 다면적 평가 (교사/조원/자기평가/팀간/팀내 평가)\n### 장점 3\n1) 자율성 증대\n2) (협동 많음) 관계성 증대\n3) 성취감과 유능감 증진"}, {"front": "[전통적 교수법] 웹기반 협동학습 — 기본개념 & 장점 3", "importance": "normal", "back": "### 기본개념\n- 웹 (웹게시판/채팅/이메일/화상 등)을 통한 협동학습\n### 장점 3\n1) 시공간 제약 극복 (→ 학습자 학습 기회 확대)\n2) 소극적인 학생도 비교적 쉽게 의견 제시\n3) 편의성, 접근성 (→ 학습 효과 극대화)"}, {"front": "[전통적 교수법] 웹기반 협동학습 — 단점 3", "importance": "normal", "back": "1) 의견 조율에 많은 시간 소요 (온라인 공간이라 제약)\n2) 정보의 과부하 발생 가능\n3) 학습 동기가 낮은 학생에게 부적합 (시공간 제약 없이 자율적임)"}, {"front": "[전통적 교수법] 웹퀘스트 수업 — 기본개념 2 & 특징 3", "importance": "normal", "back": "### 기본개념 2\n1) 웹 기반 탐구학습\n2) 인터넷 탐색 + 리포트 작성\n### 특징 3\n1) 교사의 지시와 안내에 기초 (학습과제/활동과정/정보자원 안내)\n2) 실생활 문제 해결\n3) 협동학습으로 진행"}, {"front": "[교수방법의 혁신] 컴퓨터 보조 수업(CAI) — 기본 개념 & 코스웨어란", "importance": "normal", "back": "### 기본 개념\n- 컴퓨터를 활용해 교과 ", "importance": "normal", "back": "### 개념\n- 문항이 어렵고 쉬운 정도 (지수 0% ~ 100%)\n### 공식\n- 문항난이도 = (정답자 ÷ 총 응시자) × 100\n### 활용 2\n1) 문항 난이도에 따라 문항 순서 결정 (난이도 높은 문항부터 배치)\n2) 학생 동기 유발/성취감을 위해 문항 선택\n (난이도 높은 문항 → 능력 낮은 학생 동기 유발 / 난이도 낮은 문항 → 상위권 학생 성취감)"}, {"front": "[문항분석] 고전검사이론 — ② 문항변별도 (개념 & 공식 & 활용 2)", "importance": "normal", "back": "### 개념\n- 피험자의 능력을 변별하는 정도 (지수 -1 ~ 1)\n### 공식\n- 문항변별도 = (상위집단 정답자 수 – 하위집단 정답자 수) ÷ 한 집단의 학생 수\n (*상위집단과 하위집단 정답자 수 차이 클수록 변별도 높은 문항)\n### 활용 2\n1) 상대평가에서 상위/하위 학생 변별\n2) 절대평가에서 학습 목표 달성 여부 파악 (달성/미달성 학생 변별)"}, {"front": "[문항분석] 고전검사이론 — ③ 문항추측도 & ④ 문항반응분포 (개념)", "importance": "normal", "back": "### ③ 문항추측도\n- 추측에 의해 답을 맞힐 수 있는 정도 (찍어서 맞출 확률)\n### ④ 문항반응분포\n- 선택형 문항에서 오답지의 매력도 (50%가 이상적)"}, {"front": "[문항분석] 문항반응이론 — 정의 & 문항특성곡선 (개념 & 활용)", "importance": "normal", "back": "### 문항반응이론이란\n- 평가 문항을 문항 자체에 근거해 분석하는 방법\n### ① 문항특성곡선 개념\n- 피험자의 능력 수준에 따라 문항을 맞힐 확률을 나타낸 곡선\n### 활용\n- (그래프를 근거해) 문항의 난이도, 변별도, 추측도를 규정"}, {"front": "[문항분석] 문항반응이론 — ② 문항난이도 측정 방법 & 활용 2", "importance": "normal", "back": "### 측정 방법\n- 문항특성곡선 상에서 문항의 정답을 맞힐 확률이 0.5에 해당하는 학생의 능력 수준\n### 활용 2\n1) 문항 난이도에 따라 문항 순서 결정 (난이도 낮은 문항부터 배치)\n2) 학생 동기 유발/성취감을 위해 문항 선택\n (난이도 낮은 문항 → 능력 낮은 학생 동기 유발 / 난이도 높은 문항 → 상위권 학생 성취감)"}, {"front": "[문항분석] 문항반응이론 — ③ 문항변별도 & ④ 문항추측도 측정 방법", "importance": "normal", "back": "### ③ 문항변별도 측정 방법\n- 문항특성곡선 상의 문항난이도를 산출하는 지점 (정답 맞힐 확률 0.5인 지점)에서의 기울기 (기울기 가파를수록 변별도 높음)\n### ④ 문항추측도 측정 방법\n- 문항특성곡선 상의 학생의 능력이 0인 지점에서 정답을 맞힐 확률"}]};
const subjects = Object.keys(DATA);
let curSub = subjects[0];
let idx = 0;
let flipped = false;
const seen = {};
const order = {};
const shuffledOn = {};
subjects.forEach(s=>{
  seen[s]=new Set();
  order[s]=DATA[s].map((_,i)=>i);
  shuffledOn[s]=false;
});
// current subject's cards in working order
function curCards(){ return order[curSub].map(i=>DATA[curSub][i]); }

const el=id=>document.getElementById(id);

// ---- theme ----
const themeBtn=el('themeBtn');
function applyTheme(t){
  document.documentElement.setAttribute('data-theme',t);
  themeBtn.textContent = t==='dark' ? '🌙' : '☀️';
  try{ localStorage.setItem('flashcard-theme',t); }catch(e){}
}
(function initTheme(){
  let t=null;
  try{ t=localStorage.getItem('flashcard-theme'); }catch(e){}
  if(!t){
    t = (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) ? 'light' : 'dark';
  }
  applyTheme(t);
})();
themeBtn.onclick=()=>{
  const cur=document.documentElement.getAttribute('data-theme');
  applyTheme(cur==='dark'?'light':'dark');
};
const tabsEl=el('tabs'), card=el('card'), frontText=el('frontText'),
  backText=el('backText'), counter=el('counter'), impEl=el('imp'),
  dotsEl=el('dots'), prevBtn=el('prevBtn'), nextBtn=el('nextBtn'), flipBtn=el('flipBtn');

function buildTabs(){
  tabsEl.innerHTML='';
  subjects.forEach(s=>{
    const b=document.createElement('button');
    b.className='tab'+(s===curSub?' active':'');
    b.innerHTML=`${s}<span class="cnt">${DATA[s].length}</span>`;
    b.onclick=()=>{curSub=s; idx=0; flipped=false; buildTabs(); updateOrderUI(); render();};
    tabsEl.appendChild(b);
  });
}

function esc(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function renderBack(text, table){
  const lines=text.split('\n');
  let html='', listOpen=false;
  const listMark=/^([-•]|[①-⑳]|[㉠-㉿]|[ⓐ-ⓩ]|[가-힣]\.|\d+[.)]|[ㄱ-ㅎ]\.)\s*/;
  for(let raw of lines){
    let line=raw.trimEnd();
    if(!line.trim()){continue;}
    if(line.startsWith('###')){
      html+=`<h3>${esc(line.replace(/^###\s*/,''))}</h3>`; continue;
    }
    const m=line.match(listMark);
    if(m){
      const mk=m[1]; const rest=line.slice(m[0].length);
      html+=`<div class="li"><span class="mk">${esc(mk)}</span><span class="tx">${stars(esc(rest))}</span></div>`;
    } else {
      html+=`<p>${stars(esc(line))}</p>`;
    }
  }
  if(table){ html+=table; }
  return html;
}
function stars(s){
  s=s.replace(/★★+/g,m=>`<span class="star vh">${m}</span>`);
  s=s.replace(/(^|[^v>])★/g,(_,p)=>`${p}<span class="star">★</span>`);
  return s;
}

function render(){
  const cards=curCards();
  if(idx<0)idx=0; if(idx>=cards.length)idx=cards.length-1;
  const c=cards[idx];
  flipped=false; card.classList.remove('flipped');
  frontText.textContent=c.front;
  backText.innerHTML=renderBack(c.back||'', c.table||'');
  counter.textContent=`${idx+1} / ${cards.length}`;
  // importance badge
  let imp='';
  if(c.importance==='very_high') imp='<span class="badge vhigh">★★ 핵심</span>';
  else if(c.importance==='high') imp='<span class="badge high">★ 중요</span>';
  impEl.innerHTML=imp;
  seen[curSub].add(idx);
  // dots
  dotsEl.innerHTML='';
  cards.forEach((_,i)=>{
    const d=document.createElement('div');
    d.className='dot'+(i===idx?' cur':(seen[curSub].has(i)?' done':''));
    d.onclick=()=>{idx=i; render();};
    dotsEl.appendChild(d);
  });
  prevBtn.disabled=idx===0;
  nextBtn.disabled=idx===cards.length-1;
  flipBtn.textContent='정답 확인 ↻';
  // reset scroll
  document.querySelectorAll('.face').forEach(f=>f.scrollTop=0);
}

function doFlip(){
  flipped=!flipped;
  card.classList.toggle('flipped',flipped);
  flipBtn.textContent=flipped?'문제 보기 ↻':'정답 확인 ↻';
}
card.onclick=doFlip;
flipBtn.onclick=e=>{e.stopPropagation();doFlip();};
prevBtn.onclick=()=>{if(idx>0){idx--;render();}};
nextBtn.onclick=()=>{const n=curCards().length;if(idx<n-1){idx++;render();}};

// ---- shuffle / reset ----
const shuffleBtn=el('shuffleBtn'), resetBtn=el('resetBtn'), orderTag=el('orderTag');
function shuffleArr(a){
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}
function updateOrderUI(){
  const on=shuffledOn[curSub];
  shuffleBtn.classList.toggle('active',on);
  orderTag.textContent = on ? '🔀 무작위 순서' : '';
}
shuffleBtn.onclick=()=>{
  order[curSub]=shuffleArr(DATA[curSub].map((_,i)=>i));
  shuffledOn[curSub]=true;
  seen[curSub]=new Set();
  idx=0; updateOrderUI(); render();
};
resetBtn.onclick=()=>{
  order[curSub]=DATA[curSub].map((_,i)=>i);
  shuffledOn[curSub]=false;
  seen[curSub]=new Set();
  idx=0; updateOrderUI(); render();
};

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft'){if(idx>0){idx--;render();}}
  else if(e.key==='ArrowRight'){const n=curCards().length;if(idx<n-1){idx++;render();}}
  else if(e.key===' '||e.key==='Enter'){e.preventDefault();doFlip();}
});

// swipe
let sx=0;
card.addEventListener('touchstart',e=>sx=e.touches[0].clientX,{passive:true});
card.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-sx;
  if(Math.abs(dx)>60){
    if(dx<0){const n=curCards().length;if(idx<n-1){idx++;render();}}
    else {if(idx>0){idx--;render();}}
  }
},{passive:true});


// ====== 검색 기능 ======
const searchInput = el('searchInput');
const searchClear = el('searchClear');
const searchResults = el('searchResults');
const wrapMain = document.querySelector('.wrap');
// 카드 본문 영역(검색결과 제외 나머지) 토글용 - meta/toolbar/scene/controls/dots
const normalEls = ['meta','toolbar','scene','controls','dots'].map(c=>document.querySelector('.'+c));

// 검색 대상 텍스트: front + back + table(태그 제거)
function plainText(c){
  let t = (c.front||'') + ' ' + (c.back||'');
  if(c.table){ t += ' ' + c.table.replace(/<[^>]+>/g,' '); }
  return t.replace(/[#★]/g,'').replace(/\s+/g,' ');
}
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function highlight(text, q){
  const safe = escHtml(text);
  if(!q) return safe;
  const qe = q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  return safe.replace(new RegExp(qe,'gi'), m=>`<mark>${m}</mark>`);
}
// 매칭 위치 주변 스니펫 추출
function snippet(c, q){
  const body = ((c.back||'') + (c.table? ' '+c.table.replace(/<[^>]+>/g,' '):'')).replace(/[#★]/g,'').replace(/\n/g,' ').replace(/\s+/g,' ').trim();
  if(!q) return body.slice(0,90);
  const low = body.toLowerCase();
  const pos = low.indexOf(q.toLowerCase());
  if(pos<0) return body.slice(0,90);
  const s = Math.max(0, pos-30);
  const e = Math.min(body.length, pos+q.length+60);
  return (s>0?'…':'') + body.slice(s,e) + (e<body.length?'…':'');
}

function runSearch(q){
  q = q.trim();
  searchClear.classList.toggle('show', q.length>0);
  if(!q){ exitSearch(); return; }
  // 검색 모드 진입: 카드 UI 숨김
  normalEls.forEach(e=>{ if(e) e.style.display='none'; });
  searchResults.style.display='flex';

  const results = [];
  subjects.forEach(s=>{
    DATA[s].forEach((c,i)=>{
      if(plainText(c).toLowerCase().includes(q.toLowerCase())){
        results.push({subject:s, idx:i, card:c});
      }
    });
  });

  let html = `<div class="search-summary">검색결과 <b>${results.length}</b>개 · "${escHtml(q)}"</div>`;
  if(results.length===0){
    html += `<div class="search-empty">검색 결과가 없어요.<br>다른 키워드로 검색해 보세요.</div>`;
  } else {
    results.forEach(r=>{
      let imp='';
      if(r.card.importance==='very_high') imp=' <span class="badge vhigh" style="font-size:10px">★★ 핵심</span>';
      else if(r.card.importance==='high') imp=' <span class="badge high" style="font-size:10px">★ 중요</span>';
      html += `<div class="result-card" data-sub="${escHtml(r.subject)}" data-idx="${r.idx}">
        <div class="rc-top"><span class="rc-subject">${escHtml(r.subject)}</span>${imp}</div>
        <div class="rc-front">${highlight(r.card.front, q)}</div>
        <div class="rc-snippet">${highlight(snippet(r.card,q), q)}</div>
      </div>`;
    });
  }
  searchResults.innerHTML = html;

  // 결과 클릭 → 해당 카드로 이동
  searchResults.querySelectorAll('.result-card').forEach(elc=>{
    elc.onclick=()=>{
      const sub = elc.getAttribute('data-sub');
      const i = parseInt(elc.getAttribute('data-idx'),10);
      // 원래 순서로 보정(섞여있을 수 있으므로 해당 카드 위치를 order에서 찾음)
      curSub = sub;
      // order 기준으로 idx 위치 찾기
      const pos = order[curSub].indexOf(i);
      idx = pos>=0 ? pos : 0;
      flipped=false;
      searchInput.value=''; searchClear.classList.remove('show');
      exitSearch();
      buildTabs(); updateOrderUI(); render();
      window.scrollTo({top:0, behavior:'smooth'});
    };
  });
}

function exitSearch(){
  searchResults.style.display='none';
  searchResults.innerHTML='';
  normalEls.forEach(e=>{ if(e) e.style.display=''; });
}

searchInput.addEventListener('input', e=>runSearch(e.target.value));
searchClear.onclick=()=>{ searchInput.value=''; searchClear.classList.remove('show'); exitSearch(); searchInput.focus(); };


buildTabs();
updateOrderUI();
render();
</script>
</body>
</html>
